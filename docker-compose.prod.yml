version: "3.9"

# ════════════════════════════════════════════════════════════════════════
#  CoverageOps – Production Docker Compose
#  Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: coverageops_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-coverageops}
      POSTGRES_USER:     ${DB_USER:-coverageops}
      POSTGRES_PASSWORD: ${DB_PASSWORD}          # REQUIRED – set in .env.prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-coverageops}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Do NOT expose port 5432 to the host in production

  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coverageops_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:  postgresql://${DB_USER:-coverageops}:${DB_PASSWORD}@db:5432/${DB_NAME:-coverageops}
      SECRET_KEY:    ${SECRET_KEY}               # REQUIRED – long random string
      CORS_ORIGINS:  '["https://${DOMAIN}"]'
      SRTM_DATA_DIR: /data/srtm
      RESULTS_DIR:   /data/results
    volumes:
      - srtm_data:/data/srtm
      - results_data:/data/results
    command: >
      sh -c "python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    # No --reload in production; 2 workers for light concurrency

  # ── React Frontend (pre-built) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coverageops_ui
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: https://${DOMAIN}

  # ── Nginx Reverse Proxy + SSL ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: coverageops_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    command: >
      sh -c "nginx -g 'daemon off;'"

  # ── Certbot (Let's Encrypt SSL cert issuance/renewal) ─────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: coverageops_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do certbot renew --webroot -w /var/www/certbot --quiet;
             sleep 12h & wait $${!}; done"

volumes:
  pg_data:
  srtm_data:
  results_data:
  certbot_www:
  certbot_certs:
