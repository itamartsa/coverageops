upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ── HTTP → HTTPS redirect + Certbot challenge ───────────────────────────────
server {
    listen 80;
    server_name ${DOMAIN};

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/geo+json
               application/javascript text/css image/svg+xml;
    gzip_min_length 1024;

    # ── API ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_buffering    off;
        client_max_body_size 50M;
    }

    # ── GeoJSON result files ──────────────────────────────────────────────
    location /data/results/ {
        alias      /data/results/;
        expires    1h;
        add_header Cache-Control "public, must-revalidate";
        types { application/geo+json geojson; }
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
