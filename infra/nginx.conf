upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name coverageops.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name coverageops.yourdomain.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/geo+json
               application/javascript text/css image/svg+xml;
    gzip_min_length 1024;

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # allow time for coverage calculation
        proxy_buffering    off;
    }

    # ── API Docs (restrict in production if needed) ───────────────────────────
    location /api/docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        # Uncomment to restrict to internal IPs:
        # allow 10.0.0.0/8;
        # deny  all;
    }

    # ── GeoJSON result files (large, cacheable) ───────────────────────────────
    location /data/results/ {
        alias      /data/results/;
        expires    1h;
        add_header Cache-Control "public, must-revalidate";
        types { application/geo+json geojson; }
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";  # WebSocket for Vite HMR
    }
}
